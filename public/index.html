<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Document</title>
</head>
<body>
        <div class="container">
                <h1>URL Shortner</h1>
                <form id="shorten-form">
                        <div>
                                <label for="url">Enter URL: </label>
                                <input type="url" name="url" id="url" required>
                        </div>
                        <div>
                                <label for="shortCode">Enter ShortCode: </label>
                                <input type="text" name="shortcode" id="shortcode" required>
                        </div>
                        <button type="submit">Shorten</button>
                </form>
                <h2>Shortened URLs</h2>
                <ul id="shortened-urls"></ul>
        </div>
        <script>
                const fetchshortened=async()=>{
                        const response=await fetch("/links");
                        const link=await response.json();
                        console.log("links:",link);

                        const list = document.getElementById("shortened-urls");
                        list.innerHTML = "";

                        for (const [shortCode, url] of Object.entries(link)) {
                                const li = document.createElement("li");
                                const truncateurl=url.length>=30 ? `${url.slice(0,30)}...`:url;
                                li.innerHTML = `<a href="/${shortCode}" target="_blank">
                                ${window.location.origin}/${shortCode}
                                </a> - ${truncateurl}`;
                                list.appendChild(li);
                        }
                }
                document.getElementById('shorten-form')
                .addEventListener('submit',async(event)=>{
                        event.preventDefault();
                        const formData=new FormData(event.target);
                        const url=formData.get('url');
                        const shortcode=formData.get('shortcode');
                        console.log(url,shortcode);

                        try{
                                const response=await fetch("/shorten",{
                                        method:"POST",
                                        headers:{"Content-type":"application/json"},
                                        body:JSON.stringify({url,shortcode})
                                });
                                if(response.ok){
                                        fetchshortened();
                                        alert("form submitted successfully");
                                }
                                else{
                                        const erormessage=await response.text();
                                        alert(erormessage);
                                }
                        }catch(error){
                                console.log(error);
                        }
                })
                fetchshortened();
        </script>
</body>
</html>
